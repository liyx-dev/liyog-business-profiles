name = "liyog-profiles-worker"
main = "src/index.js"
compatibility_date = "2026-07-01"

[[d1_databases]]
binding = "DB"
database_name = "liyog-profiles-db"
database_id = "f329a916-5b2d-4cba-84da-7095d4884d45"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "liyog-profiles-assets"
[triggers]
crons = ["0 3 * * *"]

{
  "observability": {
    "enabled": false,
    "head_sampling_rate": 1,
    "logs": {
      "enabled": true,
      "head_sampling_rate": 1,
      "persist": true,
      "invocation_logs": true
    },
    "traces": {
      "enabled": false,
      "persist": true,
      "head_sampling_rate": 1
    }
  }
}

