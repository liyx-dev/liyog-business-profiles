name = "liyog-profiles-worker"
main = "src/index.js"
compatibility_date = "2026-07-01"
compatibility_flags = [ "nodejs_compat" ]

[[d1_databases]]
binding = "DB"
database_name = "liyog-profiles-db"
database_id = "f329a916-5b2d-4cba-84da-7095d4884d45"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "liyog-profiles-assets"

[triggers]
crons = ["0 3 * * *"]
[observability.logs]
enabled = true
invocation_logs = true
[ai]
binding = "AI"

