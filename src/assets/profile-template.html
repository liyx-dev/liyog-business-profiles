<!-- =====================================================================
     LIYOG WORLD BUSINESS PROFILES — profile-template.html (Phase 1 polish)
     Pure structure. JS binds data via data-bind attributes only.
     ===================================================================== -->
<div class="lp-root" id="lp-root">

  <div class="lp-cover-wrap">
    <img class="lp-cover" data-bind="cover_url" alt="" loading="eager">
  </div>

  <div class="lp-identity">
    <img class="lp-logo" data-bind="logo_url" alt="">
    <button class="lp-edit-pen" id="lp-edit-toggle" aria-label="Edit profile" title="Edit profile" hidden>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
      </svg>
    </button>
    <h1 class="lp-name">
      <span data-bind="business_name"></span>
      <span class="lp-verified" id="lp-verified" title="Verified business" hidden>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 1.5l2.6 1.3 2.9-.4 1.3 2.6 2.6 1.3-.4 2.9L22.3 12l-1.3 2.6.4 2.9-2.6 1.3-1.3 2.6-2.9-.4L12 22.5l-2.6-1.3-2.9.4-1.3-2.6-2.6-1.3.4-2.9L1.7 12l1.3-2.6-.4-2.9 2.6-1.3L6.5 2.6l2.9.4L12 1.5z" fill="#1B7A3D"/>
          <path d="M8.5 12.5l2.3 2.3 4.7-4.7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </h1>
    <p class="lp-tagline" data-bind="tagline"></p>
  </div>

  <div class="lp-pills" id="lp-pills"></div>

  <div class="lp-actions">
    <a class="lp-btn lp-btn-primary" id="lp-btn-whatsapp" href="#" target="_blank" rel="noopener" hidden>
      <svg width="19" height="19" viewBox="0 0 24 24" fill="#fff"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.816 9.816 0 0012.04 2zm5.8 14.14c-.24.68-1.4 1.3-1.94 1.38-.5.08-1.12.11-1.81-.11-.42-.13-.95-.31-1.64-.6-2.89-1.25-4.78-4.15-4.92-4.34-.14-.19-1.18-1.57-1.18-3 0-1.43.75-2.13 1.02-2.42.27-.29.58-.36.78-.36.19 0 .39 0 .56.01.18.01.42-.07.65.5.24.58.82 2.01.89 2.16.07.15.12.32.02.52-.1.19-.15.31-.29.48-.15.17-.31.37-.44.5-.15.14-.3.3-.13.58.17.29.76 1.25 1.63 2.02 1.12.99 2.06 1.3 2.35 1.45.29.14.46.12.63-.07.17-.19.72-.84.92-1.13.19-.29.38-.24.64-.14.26.09 1.67.79 1.96.93.29.14.48.21.55.33.07.12.07.7-.17 1.38z"/></svg>
      <span>WhatsApp</span>
    </a>
    <a class="lp-btn lp-btn-secondary" id="lp-btn-call" href="#" hidden>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <span>Call</span>
    </a>
    <a class="lp-btn lp-btn-tertiary" id="lp-btn-sms" href="#" hidden>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>SMS</span>
    </a>
    <button class="lp-btn lp-btn-ghost" id="lp-btn-share" aria-label="Share this profile" title="Share">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    </button>
  </div>

  <button class="lp-inquiry-cta" id="lp-btn-inquiry" hidden>
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    <span>Send an inquiry</span>
  </button>

  <div class="lp-section" id="lp-about-section" hidden>
    <h2 class="lp-section-title">About this business</h2>
    <div class="lp-bio-preview" id="lp-bio-preview"></div>
    <button class="lp-read-more" id="lp-read-more-btn" hidden>Read more</button>
  </div>

  <div class="lp-section" id="lp-gallery-section" hidden>
    <h2 class="lp-section-title">Storefront gallery</h2>
    <p class="lp-section-sub">A closer look at what they offer</p>
    <div class="lp-gallery" id="lp-gallery"></div>
  </div>

  <div class="lp-section" id="lp-reviews-section" hidden>
    <h2 class="lp-section-title">Reviews &amp; ratings</h2>
    <div class="lp-rating-summary" id="lp-rating-summary"></div>
    <div class="lp-reviews-list" id="lp-reviews-list"></div>
    <button class="lp-view-all-reviews" id="lp-view-all-reviews" hidden>View all reviews</button>
  </div>

  <div class="lp-section" id="lp-video-section" hidden>
    <h2 class="lp-section-title">Watch</h2>
    <p class="lp-section-sub">See them in action</p>
    <div class="lp-embed-wrap">
      <iframe id="lp-youtube" src="" title="" loading="lazy" allowfullscreen></iframe>
    </div>
  </div>

  <div class="lp-section" id="lp-map-section" hidden>
    <h2 class="lp-section-title">Find them here</h2>
    <div class="lp-map-wrap">
      <iframe id="lp-map" src="" loading="lazy" title=""></iframe>
    </div>
  </div>

  <div class="lp-section" id="lp-social-section" hidden>
    <h2 class="lp-section-title">Connect elsewhere</h2>
    <div class="lp-social-row" id="lp-social-row"></div>
  </div>

  <div class="lp-meta">
    <span id="lp-views-count">0 views</span>
    <span id="lp-since-year"></span>
  </div>
</div>

<!-- Bottom sheet: full bio -->
<div class="lp-sheet-overlay" id="lp-bio-sheet-overlay">
  <div class="lp-sheet" id="lp-bio-sheet">
    <div class="lp-sheet-handle"></div>
    <div class="lp-sheet-header">
      <img class="lp-sheet-logo" id="lp-sheet-logo" src="" alt="">
      <h3 id="lp-sheet-name"></h3>
    </div>
    <div class="lp-sheet-body" id="lp-sheet-bio"></div>
    <div class="lp-sheet-cta-row" id="lp-sheet-cta-row"></div>
  </div>
</div>

<!-- Bottom sheet: all reviews -->
<div class="lp-sheet-overlay" id="lp-reviews-sheet-overlay">
  <div class="lp-sheet" id="lp-reviews-sheet">
    <div class="lp-sheet-handle"></div>
    <h3 class="lp-sheet-title-only">All reviews</h3>
    <div class="lp-sheet-body" id="lp-all-reviews-body"></div>
  </div>
</div>

<div class="lp-lightbox" id="lp-lightbox">
  <button class="lp-lightbox-close" id="lp-lightbox-close" aria-label="Close">&times;</button>
  <img id="lp-lightbox-img" src="" alt="">
</div>
